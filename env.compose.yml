# 该文件需配合.env进行使用
services:
  # caddy 服务
  caddy:
    image: ztnote/mycaddy:latest
    container_name: caddy
    # 按需要修改端口
    ports:
      - 80:80
      - 443:443
    environment:
      - CADDY_INGRESS_NETWORKS=caddy
      - CADDY_DOCKER_CADDYFILE_PATH=/config/Caddyfile
      # load from .env
      - MY_DOMAIN=${MY_DOMAIN}
      - TENCENTCLOUD_SECRET_ID=${TENCENT_ID}
      - TENCENTCLOUD_SECRET_KEY=${TENCENT_KEY}
      - JWT_KID=${JWT_KID}
      - JWT_SHARED_KEY=${JWT_SHARED_KEY}
      - AUTH_LIFETIME=${AUTH_LIFETIME}
      - ADMIN_PASS=${ADMIN_PASS}
      - DEMO_PASS=${DEMO_PASS}
    networks:
      - caddy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./caddy_data:/data
      - ./caddy_security:/caddy_security # 该文件夹会保存user.json
      - ./caddy_site:/caddy_site
      - ./Caddyfile:/config/Caddyfile
    restart: unless-stopped

  # 演示配置
  whoami:
    image: traefik/whoami
    container_name: whoami
    # 以上为一般的容器配置
    # 以下为Caddy反向代理的配置
    networks:
      - caddy
    labels:
      caddy: whoami.${MY_DOMAIN} # 域名 无需使用环境变量
      caddy.authorize: with adminspolicy # 授权策略
      caddy.reverse_proxy: "{{upstreams 80}}" # 代理端口
      # caddy.import: tls_tencent # 如果不进行全局配置则需要在此处导入

# 该部分始终需要
networks:
  caddy:
    external: true


